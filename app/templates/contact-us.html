{% extends "base.html" %}
{% block title %} FulCrum : Contact us {% endblock %}
{% block content %}
<section class="contact-us-container">
    <div class="left-side">
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1200&q=80" alt="Support and communication workspace with modern setup" width="100%" height="100%">
    </div>
    <form id="contact-us-form">
        <textarea name="message" placeholder="Enter the message you want to convey to us. It may be like complain, issue, problem, suggestion, bugs,etc. Please avoid spamming!!!!!!"></textarea>
        <button type="submit">Raise Issue</button>
    </form>
</section>
<script src="/static/scripts/contact.js"></script>
{% endblock %}
